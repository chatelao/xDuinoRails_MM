[platformio]
src_dir = xDuinoRails_MM

[env:seeed_xiao_rp2040]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-rp2040
framework = arduino
lib_deps =
  adafruit/Adafruit NeoPixel
  laserlicht/MaerklinMotorola
test_build_src = true
test_ignore = test_native

[env:seeed_xiao_rp2040_open_loop]
extends = env:seeed_xiao_rp2040
build_flags = -DFORCE_OPEN_LOOP

[env:seeed_xiao_rp2040_closed_loop]
extends = env:seeed_xiao_rp2040
build_flags = -DFORCE_CLOSED_LOOP

[env:seeed_xiao_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32.git
board = seeed_xiao_esp32c6
framework = arduino
lib_deps =
  adafruit/Adafruit NeoPixel
  laserlicht/MaerklinMotorola
test_build_src = true
test_ignore = test_native

[env:seeed_xiao_esp32c6_open_loop]
extends = env:seeed_xiao_esp32c6
build_flags = -DFORCE_OPEN_LOOP

[env:seeed_xiao_esp32c6_closed_loop]
extends = env:seeed_xiao_esp32c6
build_flags = -DFORCE_CLOSED_LOOP

[env:native]
platform = native
test_framework = unity
build_flags = -I test/mocks -DARDUINO_ARCH_RP2040
lib_ignore = MaerklinMotorola
test_build_src = true
build_src_filter = +<CvManager.cpp> +<MotorControl.cpp> +<LightsControl.cpp> +<ProtocolHandler.cpp> +<CvProgrammer.cpp> +<Logger.cpp> +<SerialConsole.cpp> +<DebugLeds.cpp>
test_ignore =
  test_protocol_handler
  test_simple

[env:native_open_loop]
extends = env:native
build_flags = -I test/mocks -DARDUINO_ARCH_RP2040 -DFORCE_OPEN_LOOP

[env:native_closed_loop]
extends = env:native
build_flags = -I test/mocks -DARDUINO_ARCH_RP2040 -DFORCE_CLOSED_LOOP
